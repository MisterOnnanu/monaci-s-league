<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' href='style.css'>
    <title>Classifica - Monaci's League</title>
    <style>
        /* STILI SPECIFICI PER LA TABELLA CLASSIFICA */
        .rank-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 15px;
        }
        .rank-title {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .rank-table-wrapper {
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            overflow-x: auto;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-family: sans-serif;
        }
        .rank-table th {
            background-color: #0d0d0d;
            color: var(--gold);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            padding: 14px 10px;
            border-bottom: 2px solid #222;
        }
        .rank-table td {
            padding: 14px 10px;
            border-bottom: 1px solid #1f1f1f;
            color: #fff;
            font-weight: 700;
            font-size: 1.02rem;
            vertical-align: middle;
        }
        .rank-table tr:last-child td {
            border-bottom: none;
        }
        .rank-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        
        /* Allineamento specifico squadra */
        .td-team {
            text-align: left !important;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .td-team img {
            height: 30px;
            width: 30px;
            object-fit: contain;
        }
        .td-pos {
            font-weight: 900 !important;
            color: #000000 !important; /* Testo nero per visibilità ottimale */
            width: 50px;
        }

        /* SFONDI CLASSIFICA DAL CARTELLONE ORIGINALE */
        .bg-semifinali { background-color: #4cd964 !important; } /* Verde per Posizioni 1 e 2 */
        .bg-quarti { background-color: #ff9500 !important; }     /* Arancione per Posizioni 3, 4, 5, 6 */

        /* PROTEZIONE PER SMARTPHONE */
        @media screen and (max-width: 768px) {
            .rank-container {
                margin: 20px auto;
                padding: 0 8px;
            }
            .rank-title {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }
            .rank-table-wrapper {
                padding: 5px;
            }
            .rank-table th, .rank-table td {
                padding: 10px 4px;
                font-size: 0.8rem;
            }
            .td-team {
                gap: 6px;
            }
            .td-team img {
                height: 22px;
                width: 22px;
            }
            .td-team span {
                font-size: 0.75rem;
                white-space: nowrap;
            }
            
            /* Impedisce alle colonne V, S, VS, SS, Dif, PT di stringersi troppo */
            .col-data {
                min-width: 30px;
                display: table-cell !important;
            }
            .td-pos {
                width: 30px;
                font-size: 0.78rem !important;
            }
        }
    </style>
</head>
<body>
    
    <header>
        <div class="nav">
            <div class="brand">
                <img src="logo.png" alt="Logo" class="logo-img">
                <span>MONACI'S LEAGUE</span>
            </div>
            <div class="hamburger" id="hamburger-menu">
                <span></span><span></span><span></span>
            </div>
            <nav class="nav-menu" id="nav-links">
                <a href="index.html">Home</a>
                <a href="squadre.html">Squadre</a>
                <a href="calendario.html">Calendario</a>
                <a href="risultati.html">Risultati</a>
                <a href="classifica.html">Classifica</a>
                <a href="marcatori.html">Marcatori</a>
            </nav>
        </div>
    </header>

                <tbody>

                    <tr>

                        <td>
                            <div class="td-team">
                                <img src="grizzly.png" alt="">

                        </td>
                        <td class="col-data">1</td>
                        <td class="col-data">0</td>
                        <td class="col-data">0</td>
                        <td class="col-data">1</td>

                    <tr>

                    <tr>

                        <td style="font-weight: 900; color: var(--gold);">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger-menu');
        const navMenu = document.getElementById('nav-links');
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
    </script>
</body>
</html>
